<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>習慣トラッカー</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root {
    --green:       #2cb97a;
    --green-light: #d6f5e8;
    --green-dark:  #1a8a58;
    --red:         #f05c5c;
    --red-light:   #fde8e8;
    --amber:       #f5a623;
    --bg:          #f0ede8;
    --card:        #ffffff;
    --text:        #1a1a1e;
    --sub:         #6b6b72;
    --hint:        #b0b0b8;
    --border:      rgba(0,0,0,0.07);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    padding-bottom: 48px;
  }

  /* ── ヘッダー ── */
  .header {
    background: linear-gradient(135deg, #2cb97a 0%, #4a90e2 100%);
    padding: 22px 18px 18px;
    position: sticky; top: 0; z-index: 10;
  }
  .header .eyebrow {
    font-size: 10px; font-weight: 700; letter-spacing: 0.14em;
    color: rgba(255,255,255,0.7); text-transform: uppercase; margin-bottom: 5px;
  }
  .header h1 { font-size: 14px; font-weight: 700; color: #fff; line-height: 1.5; }

  .content { padding: 14px; display: flex; flex-direction: column; gap: 12px; max-width: 480px; margin: 0 auto; }

  /* ── 記録カード ── */
  .record-card {
    background: var(--card); border-radius: 20px;
    padding: 20px; box-shadow: 0 2px 12px rgba(0,0,0,0.07);
    animation: fadein 0.3s ease both;
  }

  /* 日付セレクター */
  .date-selector {
    display: flex; align-items: center; gap: 8px; margin-bottom: 16px;
  }
  .date-nav-btn {
    width: 34px; height: 34px; border-radius: 10px;
    border: 1.5px solid var(--border); background: var(--bg);
    cursor: pointer; font-size: 18px; color: var(--sub);
    display: flex; align-items: center; justify-content: center;
    touch-action: manipulation; flex-shrink: 0;
    transition: background 0.1s;
  }
  .date-nav-btn:active { background: #e0ddd8; }
  .date-nav-btn:disabled { opacity: 0.3; cursor: default; }

  .date-display {
    flex: 1; text-align: center;
    background: var(--bg); border-radius: 10px;
    padding: 7px 10px; cursor: pointer;
    border: 1.5px solid var(--border);
    transition: background 0.1s;
  }
  .date-display:active { background: #e0ddd8; }
  .date-display .date-main { font-size: 14px; font-weight: 700; color: var(--text); }
  .date-display .date-sub  { font-size: 11px; color: var(--hint); margin-top: 1px; }

  /* 今日バッジ */
  .today-pill {
    font-size: 11px; font-weight: 700;
    background: linear-gradient(135deg, #2cb97a, #4a90e2);
    color: #fff; padding: 3px 10px; border-radius: 20px;
    white-space: nowrap; flex-shrink: 0;
  }
  .past-pill {
    font-size: 11px; font-weight: 700;
    background: var(--amber);
    color: #fff; padding: 3px 10px; border-radius: 20px;
    white-space: nowrap; flex-shrink: 0;
  }

  /* 日付ピッカーポップアップ */
  .picker-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.35); z-index: 100;
    align-items: flex-end; justify-content: center;
  }
  .picker-overlay.open { display: flex; }
  .picker-sheet {
    background: var(--card); border-radius: 20px 20px 0 0;
    padding: 20px; width: 100%; max-width: 480px;
    animation: slideup 0.22s ease;
  }
  @keyframes slideup { from{transform:translateY(100%)} to{transform:translateY(0)} }
  .picker-title {
    font-size: 13px; font-weight: 700; color: var(--sub);
    margin-bottom: 14px; text-align: center;
  }
  .picker-grid {
    display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px;
    margin-bottom: 16px;
  }
  .picker-day-lbl { font-size: 10px; color: var(--hint); text-align: center; padding: 2px 0; }
  .picker-day-lbl.sun { color: #f05c5c; }
  .picker-day-lbl.sat { color: #4a90e2; }
  .picker-cell {
    aspect-ratio: 1; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 500; color: var(--text);
    cursor: pointer; transition: background 0.1s;
    font-family: 'DM Mono', monospace;
    position: relative;
  }
  .picker-cell:active { background: var(--bg); }
  .picker-cell.empty  { cursor: default; }
  .picker-cell.future { color: var(--hint); cursor: default; }
  .picker-cell.has-ok   { color: var(--green); }
  .picker-cell.has-fail { color: var(--red); }
  .picker-cell.selected { background: var(--text); color: #fff !important; }
  .picker-cell.is-today { font-weight: 700; }
  .picker-cell.is-today::after {
    content: ''; position: absolute; bottom: 3px;
    left: 50%; transform: translateX(-50%);
    width: 4px; height: 4px; border-radius: 50%;
    background: var(--green);
  }
  .picker-cell.selected::after { background: #fff; }
  .picker-month-nav {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 12px;
  }
  .picker-month-btn {
    width: 32px; height: 32px; border-radius: 9px;
    border: 1.5px solid var(--border); background: var(--bg);
    cursor: pointer; font-size: 16px; color: var(--sub);
    display: flex; align-items: center; justify-content: center;
  }
  .picker-month-label { font-size: 14px; font-weight: 700; color: var(--text); }
  .picker-close {
    width: 100%; padding: 12px; border-radius: 12px;
    border: none; background: var(--bg);
    font-size: 14px; font-weight: 700; color: var(--sub);
    cursor: pointer; font-family: 'Noto Sans JP', sans-serif;
  }

  .question { font-size: 13px; color: var(--sub); margin-bottom: 14px; line-height: 1.6; }

  /* ○× ボタン */
  .choice-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .choice-btn {
    height: 82px; border-radius: 16px;
    border: 2.5px solid transparent;
    background: var(--bg); cursor: pointer;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 5px;
    transition: transform 0.12s, box-shadow 0.12s, opacity 0.12s;
    touch-action: manipulation; -webkit-user-select: none; user-select: none;
  }
  .choice-btn:active { transform: scale(0.94); }
  .choice-btn .symbol { font-family: 'DM Mono', monospace; font-size: 32px; font-weight: 500; line-height: 1; }
  .choice-btn .cap { font-size: 11px; font-weight: 700; }

  .ok-idle   { border-color: var(--green-light); }
  .ok-idle   .symbol { color: var(--green); }
  .ok-idle   .cap    { color: var(--green); }
  .fail-idle { border-color: #fde8e8; }
  .fail-idle .symbol { color: var(--red); }
  .fail-idle .cap    { color: var(--red); }
  .ok-sel {
    background: var(--green-light); border-color: var(--green);
    box-shadow: 0 4px 18px rgba(44,185,122,0.28);
  }
  .ok-sel .symbol { color: var(--green-dark); }
  .ok-sel .cap    { color: var(--green-dark); }
  .fail-sel {
    background: var(--red-light); border-color: var(--red);
    box-shadow: 0 4px 18px rgba(240,92,92,0.22);
  }
  .fail-sel .symbol { color: #c03030; }
  .fail-sel .cap    { color: #c03030; }
  .dimmed { opacity: 0.32; }

  /* ── ストリーク ── */
  .streak-card {
    border-radius: 20px; padding: 18px 20px;
    display: flex; align-items: center; gap: 14px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    animation: fadein 0.3s ease 0.04s both;
  }
  .streak-card.active { background: linear-gradient(135deg, #2cb97a 0%, #43c6a8 100%); }
  .streak-card.zero   { background: var(--card); }
  .streak-num { font-family: 'DM Mono', monospace; font-size: 52px; font-weight: 500; line-height: 1; min-width: 64px; }
  .streak-card.active .streak-num { color: #fff; }
  .streak-card.zero   .streak-num { color: var(--hint); }
  .streak-meta { flex: 1; }
  .s-day-lbl { font-size: 12px; margin-bottom: 2px; }
  .streak-card.active .s-day-lbl { color: rgba(255,255,255,0.75); }
  .streak-card.zero   .s-day-lbl { color: var(--hint); }
  .s-msg { font-size: 14px; font-weight: 700; }
  .streak-card.active .s-msg { color: #fff; }
  .streak-card.zero   .s-msg { color: var(--sub); }
  .streak-right { text-align: right; }
  .s-stat { font-size: 11px; margin-bottom: 3px; }
  .streak-card.active .s-stat   { color: rgba(255,255,255,0.7); }
  .streak-card.active .s-stat b { color: #fff; font-weight: 700; }
  .streak-card.zero   .s-stat   { color: var(--hint); }
  .streak-card.zero   .s-stat b { color: var(--sub); font-weight: 700; }

  /* ── 週間カード ── */
  .week-card {
    background: var(--card); border-radius: 20px; padding: 18px 20px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.07);
    animation: fadein 0.3s ease 0.08s both;
  }
  .sec-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
  .sec-title { font-size: 12px; font-weight: 700; letter-spacing: 0.05em; color: var(--sub); }
  .week-nav { display: flex; gap: 4px; }
  .nav-btn {
    width: 30px; height: 30px; border-radius: 9px;
    border: 1.5px solid var(--border); background: var(--bg);
    cursor: pointer; font-size: 16px; color: var(--sub);
    display: flex; align-items: center; justify-content: center;
    touch-action: manipulation;
  }
  .nav-btn:active { background: #e0ddd8; }

  .week-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 5px; margin-bottom: 12px; }
  .day-col { display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .day-lbl     { font-size: 10px; color: var(--hint); }
  .day-lbl.sun { color: #f05c5c; }
  .day-lbl.sat { color: #4a90e2; }
  .day-circle {
    width: 38px; height: 38px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 500;
    color: var(--hint); background: var(--bg);
    cursor: pointer; transition: opacity 0.1s;
  }
  .day-circle:active { opacity: 0.7; }
  .day-circle.future     { color: #d0cfc8; cursor: default; }
  .day-circle.unrecorded { border: 1.5px dashed #d0cfc8; }
  .day-circle.ok {
    background: linear-gradient(135deg, #2cb97a, #43c6a8);
    color: #fff; font-size: 18px;
    box-shadow: 0 3px 10px rgba(44,185,122,0.35);
  }
  .day-circle.fail {
    background: linear-gradient(135deg, #f05c5c, #f57f7f);
    color: #fff; font-size: 18px;
    box-shadow: 0 3px 10px rgba(240,92,92,0.28);
  }
  .day-circle.today-ring         { box-shadow: 0 0 0 3px var(--green), 0 3px 10px rgba(44,185,122,0.35); }
  .day-circle.today-ring.fail    { box-shadow: 0 0 0 3px var(--red),   0 3px 10px rgba(240,92,92,0.28); }
  .day-circle.today-ring.unrecorded { box-shadow: 0 0 0 3px var(--green); }
  .day-circle.editing-ring { box-shadow: 0 0 0 3px var(--amber) !important; }

  .rate-row { display: flex; align-items: center; gap: 10px; }
  .rate-bar { flex: 1; height: 6px; background: var(--bg); border-radius: 9px; overflow: hidden; }
  .rate-fill { height: 100%; border-radius: 9px; transition: width 0.45s ease; }
  .rate-pct { font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 500; min-width: 40px; text-align: right; }

  /* ── 90日ドット ── */
  .history-card {
    background: var(--card); border-radius: 20px; padding: 18px 20px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.07);
    animation: fadein 0.3s ease 0.12s both;
  }
  .month-block { margin-bottom: 10px; }
  .month-lbl { font-size: 11px; color: var(--hint); margin-bottom: 5px; font-weight: 500; }
  .dot-row { display: flex; flex-wrap: wrap; gap: 4px; }
  .dot { width: 16px; height: 16px; border-radius: 5px; cursor: pointer; transition: transform 0.1s; }
  .dot:active { transform: scale(0.85); }
  .dot.ok          { background: linear-gradient(135deg, #2cb97a, #43c6a8); }
  .dot.fail        { background: linear-gradient(135deg, #f05c5c, #f57f7f); }
  .dot.unrecorded  { background: #e2dfda; }
  .dot.future      { background: transparent; cursor: default; }
  .dot.today-dot   { outline: 2.5px solid var(--green); outline-offset: 1px; }
  .dot.editing-dot { outline: 2.5px solid var(--amber); outline-offset: 1px; }

  .legend { display: flex; gap: 16px; margin-top: 10px; flex-wrap: wrap; }
  .leg-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--sub); }
  .leg-dot { width: 12px; height: 12px; border-radius: 3px; }

  /* ヒント */
  .hint-text {
    font-size: 11px; color: var(--hint); text-align: center;
    margin-top: -4px;
  }

  .reset-wrap { text-align: center; padding-top: 4px; }
  .reset-btn {
    background: none; border: none; cursor: pointer;
    font-size: 12px; color: var(--hint);
    text-decoration: underline; font-family: 'Noto Sans JP', sans-serif;
  }

  @keyframes pop    { 0%{transform:scale(1)} 35%{transform:scale(1.1)} 100%{transform:scale(1)} }
  @keyframes fadein { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
  .pop { animation: pop 0.22s ease; }
</style>
</head>
<body>

<div class="header">
  <div class="eyebrow">習慣トラッカー</div>
  <h1>コンビニ・スーパーでお菓子・甘い飲み物・<br>お酒の衝動買いをしない</h1>
</div>

<div class="content">

  <!-- 記録カード -->
  <div class="record-card">
    <!-- 日付セレクター -->
    <div class="date-selector">
      <button class="date-nav-btn" id="prev-day" onclick="shiftDay(-1)">‹</button>
      <div class="date-display" onclick="openPicker()">
        <div class="date-main" id="editing-date-main">—</div>
        <div class="date-sub">タップして日付を選ぶ</div>
      </div>
      <button class="date-nav-btn" id="next-day" onclick="shiftDay(1)">›</button>
      <div id="day-pill" class="today-pill">今日</div>
    </div>

    <div class="question" id="record-question">この日、衝動買いしませんでしたか？</div>
    <div class="choice-row">
      <button class="choice-btn ok-idle" id="btn-ok" onclick="record('ok')">
        <span class="symbol">○</span>
        <span class="cap">しなかった</span>
      </button>
      <button class="choice-btn fail-idle" id="btn-fail" onclick="record('fail')">
        <span class="symbol">×</span>
        <span class="cap">してしまった</span>
      </button>
    </div>
  </div>

  <!-- ストリーク -->
  <div class="streak-card zero" id="streak-card">
    <div class="streak-num" id="streak-num">0</div>
    <div class="streak-meta">
      <div class="s-day-lbl">日連続達成</div>
      <div class="s-msg" id="streak-msg">記録をつけよう</div>
    </div>
    <div class="streak-right">
      <div class="s-stat">達成 <b id="s-ok">—</b> 日</div>
      <div class="s-stat">達成率 <b id="s-rate">—</b></div>
    </div>
  </div>

  <!-- 週間 -->
  <div class="week-card">
    <div class="sec-header">
      <div class="sec-title" id="week-label">今週</div>
      <div class="week-nav">
        <button class="nav-btn" onclick="changeWeek(-1)">‹</button>
        <button class="nav-btn" onclick="changeWeek(1)">›</button>
      </div>
    </div>
    <div class="week-grid" id="week-grid"></div>
    <div class="rate-row">
      <div class="rate-bar"><div class="rate-fill" id="rate-fill"></div></div>
      <div class="rate-pct" id="rate-pct" style="color:var(--hint)">—</div>
    </div>
  </div>
  <div class="hint-text">週のマスをタップしても日付を選べます</div>

  <!-- 90日 -->
  <div class="history-card">
    <div class="sec-header">
      <div class="sec-title">過去 90 日</div>
    </div>
    <div id="dot-map"></div>
    <div class="legend">
      <div class="leg-item"><div class="leg-dot" style="background:var(--green)"></div>達成 ○</div>
      <div class="leg-item"><div class="leg-dot" style="background:var(--red)"></div>失敗 ×</div>
      <div class="leg-item"><div class="leg-dot" style="background:#e2dfda"></div>未記録</div>
    </div>
  </div>
  <div class="hint-text">ドットをタップしても日付を選べます</div>

  <div class="reset-wrap">
    <button class="reset-btn" onclick="resetAll()">データをリセット</button>
  </div>
</div>

<!-- 日付ピッカー -->
<div class="picker-overlay" id="picker-overlay" onclick="closePicker(event)">
  <div class="picker-sheet">
    <div class="picker-title">日付を選んで記録</div>
    <div class="picker-month-nav">
      <button class="picker-month-btn" onclick="shiftPickerMonth(-1)">‹</button>
      <div class="picker-month-label" id="picker-month-label">—</div>
      <button class="picker-month-btn" onclick="shiftPickerMonth(1)">›</button>
    </div>
    <div class="picker-grid" id="picker-grid"></div>
    <button class="picker-close" onclick="closePicker()">閉じる</button>
  </div>
</div>

<script>
const DAYS   = ['日','月','火','水','木','金','土'];
const MONTHS = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];

function toKey(d) {
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function fromKey(k) {
  const [y,m,d] = k.split('-').map(Number);
  return new Date(y, m-1, d);
}
function today() { const d=new Date(); d.setHours(0,0,0,0); return d; }
function load()  { try{return JSON.parse(localStorage.getItem('kohari_habit')||'{}');}catch(e){return{};} }
function save(d) { try{localStorage.setItem('kohari_habit',JSON.stringify(d));}catch(e){} }

// 編集中の日付（デフォルト:今日）
let editingKey = toKey(today());
let weekOffset = 0;
let pickerMonth = new Date(today().getFullYear(), today().getMonth(), 1);

/* ── 日付移動 ── */
function shiftDay(dir) {
  const d = fromKey(editingKey);
  d.setDate(d.getDate() + dir);
  if (d > today()) return;
  editingKey = toKey(d);
  render();
}

function jumpToDate(key) {
  const d = fromKey(key);
  if (d > today()) return;
  editingKey = key;
  // 週グリッドがその日を含む週に合わせる
  const t = today(), tDay = t.getDay();
  const thisMon = new Date(t);
  thisMon.setDate(t.getDate() - (tDay===0?6:tDay-1));
  const editD = fromKey(key);
  const diff = Math.floor((thisMon - editD) / (7*24*3600*1000));
  weekOffset = diff > 0 ? -diff : 0;
  closePicker();
  render();
}

/* ── 記録 ── */
function record(val) {
  const data = load();
  if (data[editingKey] === val) delete data[editingKey];
  else data[editingKey] = val;
  save(data);
  const btn = document.getElementById(val==='ok'?'btn-ok':'btn-fail');
  btn.classList.add('pop');
  btn.addEventListener('animationend',()=>btn.classList.remove('pop'),{once:true});
  render();
}

/* ── ピッカー ── */
function openPicker() {
  pickerMonth = new Date(fromKey(editingKey).getFullYear(), fromKey(editingKey).getMonth(), 1);
  renderPicker();
  document.getElementById('picker-overlay').classList.add('open');
}
function closePicker(e) {
  if (e && e.target !== document.getElementById('picker-overlay')) return;
  document.getElementById('picker-overlay').classList.remove('open');
}
function shiftPickerMonth(dir) {
  pickerMonth.setMonth(pickerMonth.getMonth() + dir);
  const t = today();
  if (pickerMonth > new Date(t.getFullYear(), t.getMonth(), 1))
    pickerMonth = new Date(t.getFullYear(), t.getMonth(), 1);
  renderPicker();
}
function renderPicker() {
  const data = load();
  const t = today();
  document.getElementById('picker-month-label').textContent =
    pickerMonth.getFullYear()+'年'+(pickerMonth.getMonth()+1)+'月';
  const grid = document.getElementById('picker-grid');
  grid.innerHTML = '';
  // 曜日ヘッダー
  DAYS.forEach((d,i)=>{
    const el=document.createElement('div');
    el.className='picker-day-lbl'+(i===0?' sun':i===6?' sat':'');
    el.textContent=d; grid.appendChild(el);
  });
  // 月初の空白
  const firstDay = new Date(pickerMonth.getFullYear(), pickerMonth.getMonth(), 1).getDay();
  for(let i=0;i<firstDay;i++){
    const el=document.createElement('div'); el.className='picker-cell empty'; grid.appendChild(el);
  }
  // 日付
  const daysInMonth = new Date(pickerMonth.getFullYear(), pickerMonth.getMonth()+1, 0).getDate();
  for(let d=1;d<=daysInMonth;d++){
    const date = new Date(pickerMonth.getFullYear(), pickerMonth.getMonth(), d);
    const k = toKey(date);
    const isFuture = date > t;
    const isToday  = k === toKey(t);
    const isEditing= k === editingKey;
    const val = data[k];
    let cls = 'picker-cell';
    if(isFuture) cls+=' future';
    else {
      if(val==='ok')   cls+=' has-ok';
      if(val==='fail') cls+=' has-fail';
    }
    if(isToday)   cls+=' is-today';
    if(isEditing) cls+=' selected';
    const el = document.createElement('div');
    el.className = cls;
    el.textContent = d;
    if(!isFuture) el.onclick = ()=>jumpToDate(k);
    grid.appendChild(el);
  }
}

/* ── 週ナビ ── */
function changeWeek(dir) { weekOffset+=dir; if(weekOffset>0)weekOffset=0; render(); }

function getWeekMon(off) {
  const t=today(),day=t.getDay(),d=new Date(t);
  d.setDate(t.getDate()-(day===0?6:day-1)+off*7);
  d.setHours(0,0,0,0); return d;
}

function rateGrad(p) {
  if(p>=80) return 'linear-gradient(90deg,#2cb97a,#43c6a8)';
  if(p>=50) return 'linear-gradient(90deg,#f5a623,#f7c06e)';
  return 'linear-gradient(90deg,#f05c5c,#f57f7f)';
}
function rateColor(p) {
  if(p>=80) return 'var(--green)';
  if(p>=50) return 'var(--amber)';
  return 'var(--red)';
}

/* ── メイン描画 ── */
function render() {
  const data=load(), now=today(), todayKey=toKey(now);
  const isToday = editingKey===todayKey;
  const editD   = fromKey(editingKey);

  // 日付表示
  document.getElementById('editing-date-main').textContent =
    editD.getFullYear()+'年'+(editD.getMonth()+1)+'月'+editD.getDate()+'日（'+DAYS[editD.getDay()]+'）';
  const pill = document.getElementById('day-pill');
  if(isToday){ pill.className='today-pill'; pill.textContent='今日'; }
  else       { pill.className='past-pill';  pill.textContent='過去'; }

  // ‹ › ボタン
  document.getElementById('prev-day').disabled = false;
  document.getElementById('next-day').disabled = isToday;

  // ○×ボタン
  const v=data[editingKey];
  document.getElementById('btn-ok').className  ='choice-btn '+(v==='ok'?'ok-sel':v==='fail'?'fail-idle dimmed':'ok-idle');
  document.getElementById('btn-fail').className='choice-btn '+(v==='fail'?'fail-sel':v==='ok'?'ok-idle dimmed':'fail-idle');

  // ストリーク（今日起点で計算）
  let streak=0; const ch=new Date(now);
  while(true){const k=toKey(ch);if(data[k]==='ok'){streak++;ch.setDate(ch.getDate()-1);}else break;}
  const okCount =Object.keys(data).filter(k=>data[k]==='ok').length;
  const recCount=Object.keys(data).filter(k=>data[k]).length;
  const rate=recCount>0?Math.round(okCount/recCount*100):null;
  document.getElementById('streak-num').textContent=streak;
  document.getElementById('streak-msg').textContent=
    streak===0?'今日から始めよう！':
    streak>=30?'🎉 30日達成！すごい！':
    streak>=14?'✨ 2週間突破！':
    streak>=7 ?'🌟 1週間達成！':'この調子で！';
  document.getElementById('s-ok').textContent   =okCount;
  document.getElementById('s-rate').textContent =rate!==null?rate+'%':'—';
  document.getElementById('streak-card').className='streak-card '+(streak>0?'active':'zero');

  // 週間グリッド
  const wMon=getWeekMon(weekOffset);
  const wSun=new Date(wMon); wSun.setDate(wMon.getDate()+6);
  document.getElementById('week-label').textContent=
    weekOffset===0?'今週':(wMon.getMonth()+1)+'月'+wMon.getDate()+'日〜'+(wSun.getMonth()+1)+'月'+wSun.getDate()+'日';

  const wg=document.getElementById('week-grid'); wg.innerHTML='';
  let wOk=0,wRec=0;
  for(let i=0;i<7;i++){
    const d=new Date(wMon); d.setDate(wMon.getDate()+i);
    const k=toKey(d),isFuture=d>now,isT=k===todayKey,isEditing=k===editingKey;
    const val=data[k];
    if(!isFuture&&val==='ok'){wOk++;wRec++;}
    else if(!isFuture&&val==='fail'){wRec++;}
    const di=d.getDay();
    const dlCls='day-lbl'+(di===0?' sun':di===6?' sat':'');
    let cc='day-circle',sym=d.getDate();
    if(!isFuture){
      if(val==='ok'){cc+=' ok';sym='○';}
      else if(val==='fail'){cc+=' fail';sym='×';}
      else cc+=' unrecorded';
    } else cc+=' future';
    if(isT&&!isEditing) cc+=' today-ring';
    if(isEditing)       cc+=' editing-ring';
    const clickable = !isFuture;
    wg.innerHTML+=`<div class="day-col">
      <div class="${dlCls}">${DAYS[di]}</div>
      <div class="${cc}" ${clickable?`onclick="jumpToDate('${k}')"`:''} style="${clickable?'cursor:pointer':'cursor:default'}">${sym}</div>
    </div>`;
  }
  const wPct=wRec>0?Math.round(wOk/wRec*100):0;
  const rf=document.getElementById('rate-fill');
  rf.style.width=wRec>0?wPct+'%':'0%';
  rf.style.background=rateGrad(wPct);
  const rp=document.getElementById('rate-pct');
  rp.textContent=wRec>0?wPct+'%':'未記録';
  rp.style.color=wRec>0?rateColor(wPct):'var(--hint)';

  // 90日ドット
  const start=new Date(now); start.setDate(now.getDate()-89); start.setHours(0,0,0,0);
  const dm=document.getElementById('dot-map'); dm.innerHTML='';
  let curM=-1,rowEl=null;
  for(let i=0;i<90;i++){
    const d=new Date(start); d.setDate(start.getDate()+i);
    const m=d.getMonth();
    if(m!==curM){
      curM=m;
      const block=document.createElement('div'); block.className='month-block';
      block.innerHTML=`<div class="month-lbl">${MONTHS[m]}</div>`;
      rowEl=document.createElement('div'); rowEl.className='dot-row';
      block.appendChild(rowEl); dm.appendChild(block);
    }
    const k=toKey(d),isFuture=d>now,val=data[k];
    const dot=document.createElement('div');
    let dc='dot';
    if(isFuture) dc+=' future';
    else dc+=val==='ok'?' ok':val==='fail'?' fail':' unrecorded';
    if(k===todayKey&&k!==editingKey)    dc+=' today-dot';
    if(k===editingKey) dc+=' editing-dot';
    dot.className=dc;
    dot.title=(d.getMonth()+1)+'月'+d.getDate()+'日'+(val==='ok'?' ○':val==='fail'?' ×':'');
    if(!isFuture) dot.onclick=()=>jumpToDate(k);
    rowEl.appendChild(dot);
  }
}

function resetAll(){
  if(confirm('記録をすべて削除しますか？')){
    try{localStorage.removeItem('kohari_habit');}catch(e){}
    editingKey=toKey(today()); weekOffset=0; render();
  }
}

render();
</script>
